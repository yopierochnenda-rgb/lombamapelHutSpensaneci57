<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - SEMARAK SPENSANECI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
    .admin-card { border: none; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); background: #ffffff; }
    .header-admin { background: #1e293b; color: white; padding: 20px; border-radius: 12px 12px 0 0; }
  </style>
</head>
<body>

  <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="card admin-card w-100" style="max-width: 600px;">
      <div class="header-admin text-center">
        <h4 class="fw-bold m-0">🛠️ ADMIN PANEL</h4>
        <p class="small text-light m-0 opacity-75">Input Data Peserta Susulan / Manual</p>
      </div>
      
      <div class="card-body p-4 p-md-5">
        <form id="form-admin" onsubmit="tambahPeserta(event)">
          
          <div class="mb-3">
            <label class="form-label fw-bold text-secondary small">Nomor Ujian Peserta</label>
            <input type="text" id="input-no" class="form-control form-control-lg fw-bold" style="text-transform: uppercase;" placeholder="Contoh: SN-099" required autocomplete="off">
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold text-secondary small">Nama Lengkap</label>
            <input type="text" id="input-nama" class="form-control form-control-lg fw-semibold" placeholder="Masukkan nama peserta..." required autocomplete="off">
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold text-secondary small">Asal Sekolah</label>
            <input type="text" id="input-sekolah" class="form-control form-control-lg fw-semibold" placeholder="Masukkan asal sekolah..." required autocomplete="off">
          </div>

          <button type="submit" id="btn-simpan" class="btn btn-success btn-lg w-100 fw-bold shadow-sm">
            ➕ TAMBAHKAN KE GOOGLE SHEETS
          </button>
          
        </form>
        
        <div id="alert-msg" class="alert mt-4 d-none text-center fw-bold" role="alert"></div>
      </div>
    </div>
  </div>

  <script>
    // 🚨 WAJIB GANTI LINK INI DENGAN LINK WEB APP ANDA YANG AKTIF!
    const API_URL = "https://script.google.com/macros/s/AKfycbw6iUsySZVMRFgn-eCqDY7aYTfypTBbQlOnuImhlvbSdKqfdMmyJRPIfYDauKOORQLw/exec";

    function tambahPeserta(e) {
      e.preventDefault();
      
      const noPeserta = document.getElementById('input-no').value.trim().toUpperCase();
      const namaPeserta = document.getElementById('input-nama').value.trim();
      const asalSekolah = document.getElementById('input-sekolah').value.trim();
      
      const btn = document.getElementById('btn-simpan');
      const alertBox = document.getElementById('alert-msg');
      
      btn.innerText = "⏳ Menyimpan ke Database...";
      btn.disabled = true;
      alertBox.classList.add('d-none');

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'addParticipant',
          noPeserta: noPeserta,
          namaPeserta: namaPeserta,
          asalSekolah: asalSekolah
        })
      })
      .then(res => res.json())
      .then(res => {
        alertBox.classList.remove('d-none');
        if(res.success) {
          alertBox.className = "alert alert-success mt-4 text-center fw-bold";
          alertBox.innerText = "✅ Berhasil! Peserta sudah masuk ke Google Sheets.";
          document.getElementById('form-admin').reset(); // Kosongkan form
        } else {
          alertBox.className = "alert alert-danger mt-4 text-center fw-bold";
          alertBox.innerText = "❌ Gagal: " + res.message;
        }
      })
      .catch(err => {
        alertBox.classList.remove('d-none');
        alertBox.className = "alert alert-danger mt-4 text-center fw-bold";
        alertBox.innerText = "❌ Terjadi kesalahan jaringan.";
      })
      .finally(() => {
        btn.innerText = "➕ TAMBAHKAN KE GOOGLE SHEETS";
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
