<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - SEMARAK SPENSANECI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
    .admin-card { border: none; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); background: #ffffff; }
    .header-admin { background: #1e293b; color: white; padding: 20px; border-radius: 12px 12px 0 0; }
  </style>
</head>
<body>

  <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="card admin-card w-100" style="max-width: 600px;">
      <div class="header-admin text-center">
        <h4 class="fw-bold m-0">🛠️ ADMIN PANEL</h4>
        <p class="small text-light m-0 opacity-75">Input Data Peserta Susulan / Manual</p>
      </div>
      
      <div class="card-body p-4 p-md-5">
        <form id="form-admin" onsubmit="tambahPeserta(event)">
          
          <div class="mb-3">
            <label class="form-label fw-bold text-secondary small">Nomor Ujian Peserta</label>
            <input type="text" id="input-no" class="form-control form-control-lg fw-bold" style="text-transform: uppercase;" placeholder="Contoh: SN-099" required autocomplete="off">
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold text-secondary small">Nama Lengkap</label>
            <input type="text" id="input-nama" class="form-control form-control-lg fw-semibold" placeholder="Masukkan nama peserta..." required autocomplete="off">
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold text-secondary small">Asal Sekolah</label>
            <input type="text" id="input-sekolah" class="form-control form-control-lg fw-semibold" placeholder="Masukkan asal sekolah..." required autocomplete="off">
          </div>

          <button type="submit" id="btn-simpan" class="btn btn-success btn-lg w-100 fw-bold shadow-sm">
            ➕ TAMBAHKAN & CETAK KARTU
          </button>
          
        </form>
        
        <div id="alert-msg" class="alert mt-4 d-none text-center fw-bold" role="alert"></div>
      </div>
    </div>
  </div>

  <div id="kartu-cetak" style="position: absolute; left: -9999px; width: 323px; height: 204px; background: white; border: 2px solid #000; border-radius: 8px; padding: 12px; font-family: Arial, sans-serif; box-sizing: border-box; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=');">
      
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 12px;">
          <img src="logo.png" alt="Logo 1" style="width: 35px; height: 35px; object-fit: contain;">
          <h4 style="margin: 0; font-size: 11px; text-align: center; color: #000; font-weight: bold; line-height: 1.3;">
              SEMARAK HUT 57<br>SPENSANECI 2026
          </h4>
          <img src="logo2.png" alt="Logo 2" style="width: 35px; height: 35px; object-fit: contain;">
      </div>
      
      <div style="font-size: 12px; color: #000; line-height: 1.6;">
          <div style="display: flex;"><strong style="width: 85px;">No. Peserta</strong><span>: <span id="cetak-no"></span></span></div>
          <div style="display: flex;"><strong style="width: 85px;">Nama</strong><span>: <span id="cetak-nama"></span></span></div>
          <div style="display: flex;"><strong style="width: 85px;">Sekolah</strong><span>: <span id="cetak-sekolah"></span></span></div>
      </div>
  </div>

  <script>
    // 🚨 WAJIB GANTI LINK INI DENGAN LINK WEB APP ANDA YANG AKTIF!
    const API_URL = "https://script.google.com/macros/s/AKfycbw6iUsySZVMRFgn-eCqDY7aYTfypTBbQlOnuImhlvbSdKqfdMmyJRPIfYDauKOORQLw/exec";

    // FUNGSI UNTUK MENCETAK KARTU PDF
    async function downloadKartuPDF(noPeserta, namaPeserta, asalSekolah) {
        try {
            // 1. Masukkan data ke template
            document.getElementById('cetak-no').innerText = noPeserta;
            document.getElementById('cetak-nama').innerText = namaPeserta;
            document.getElementById('cetak-sekolah').innerText = asalSekolah;

            // 2. Render HTML jadi Gambar (Canvas)
            const kartuElement = document.getElementById('kartu-cetak');
            const canvas = await html2canvas(kartuElement, { 
                scale: 3, // HD Resolution
                useCORS: true // Izinkan load gambar/logo dari repo
            });
            const imgData = canvas.toDataURL('image/png');

            // 3. Bentuk PDF ukuran KTP
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'mm',
                format: [85.6, 54]
            });

            // 4. Tempel gambar dan unduh
            pdf.addImage(imgData, 'PNG', 0, 0, 85.6, 54);
            pdf.save(`Kartu_Peserta_${noPeserta}.pdf`);
        } catch (error) {
            console.error("Gagal mencetak PDF:", error);
            alert("Data berhasil disimpan, namun terjadi kesalahan saat mencetak PDF.");
        }
    }

    // FUNGSI UTAMA TAMBAH PESERTA KE GOOGLE SHEETS
    function tambahPeserta(e) {
      e.preventDefault();
      
      const noPeserta = document.getElementById('input-no').value.trim().toUpperCase();
      const namaPeserta = document.getElementById('input-nama').value.trim();
      const asalSekolah = document.getElementById('input-sekolah').value.trim();
      
      const btn = document.getElementById('btn-simpan');
      const alertBox = document.getElementById('alert-msg');
      
      btn.innerText = "⏳ Menyimpan & Membuat PDF...";
      btn.disabled = true;
      alertBox.classList.add('d-none');

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'addParticipant',
          noPeserta: noPeserta,
          namaPeserta: namaPeserta,
          asalSekolah: asalSekolah
        })
      })
      .then(res => res.json())
      .then(res => {
        alertBox.classList.remove('d-none');
        if(res.success) {
          alertBox.className = "alert alert-success mt-4 text-center fw-bold";
          alertBox.innerText = "✅ Berhasil! Peserta tersimpan & Kartu sedang diunduh.";
          
          // 👉 PANGGIL FUNGSI PDF DI SINI KARENA DATA SUKSES MASUK
          downloadKartuPDF(noPeserta, namaPeserta, asalSekolah);

          document.getElementById('form-admin').reset(); // Kosongkan form
        } else {
          alertBox.className = "alert alert-danger mt-4 text-center fw-bold";
          alertBox.innerText = "❌ Gagal: " + res.message;
        }
      })
      .catch(err => {
        alertBox.classList.remove('d-none');
        alertBox.className = "alert alert-danger mt-4 text-center fw-bold";
        alertBox.innerText = "❌ Terjadi kesalahan jaringan.";
      })
      .finally(() => {
        btn.innerText = "➕ TAMBAHKAN & CETAK KARTU";
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
