<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Ujian CAT - SEMARAK SPENSANECI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f1f5f9; color: #334155; font-family: 'Segoe UI', sans-serif; }
    .logo-container { width: 90px; height: 90px; border-radius: 50%; background: #fff; border: 3px solid #0d6efd; display: inline-flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .logo-container img { width: 100%; height: 100%; object-fit: cover; }
    .card-custom { border: none; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); background: #ffffff; }
    #exam-page { display: none; }
    .timer-badge { font-size: 1.2rem; font-weight: bold; background-color: #ef4444; color: white; padding: 8px 16px; border-radius: 30px; box-shadow: 0 4px 10px rgba(239,68,68,0.3); }
    .question-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 20px; }
    .soal-gambar { max-width: 100%; max-height: 350px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
    .option-btn { display: block; width: 100%; text-align: left; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s ease; }
    .option-btn:hover { background: #e2e8f0; }
    .option-btn input { margin-right: 12px; transform: scale(1.2); }
    .option-btn.selected { background: #dbeafe; border-color: #3b82f6; font-weight: 600; color: #1e40af; }
    .nav-floating-box { position: fixed; bottom: 20px; right: 20px; z-index: 1000; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 1px solid #e2e8f0; }
    .status-sync { font-size: 0.85rem; font-weight: 600; color: #10b981; }
  </style>
</head>
<body>

  <div id="login-page" class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card card-custom p-4 p-md-5 text-center" style="width: 100%; max-width: 500px;">
      <div class="d-flex justify-content-center gap-3 mb-4">
        <div class="logo-container"><img src="logo.png" alt="Logo 1"></div>
        <div class="logo-container" style="border-color: #ffc107;"><img src="logo2.png" alt="Logo 2"></div>
      </div>
      <h3 class="fw-bold text-dark m-0">SEMARAK SPENSANECI</h3>
      <p class="text-muted small mb-4">Sistem Login Terkunci - Masukkan Nomor Ujian Anda</p>
      
      <div class="text-start mb-3">
        <label class="form-label small fw-bold text-secondary">Nomor Ujian Peserta</label>
        <div class="input-group">
          <input type="text" id="no-peserta" class="form-control form-control-lg text-center fw-bold" style="text-transform: uppercase;" placeholder="Contoh: SN-001" autocomplete="off">
          <button class="btn btn-dark fw-bold px-3" type="button" id="btn-cek" onclick="cekNomorPeserta()">CEK NOMOR</button>
        </div>
      </div>
      
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="text-start mb-3">
          <label class="form-label small fw-bold text-secondary">Nama Lengkap Peserta</label>
          <input type="text" id="nama-peserta" class="form-control form-control-lg bg-light fw-semibold text-muted" placeholder="Akan terisi otomatis setelah dicek" readonly required>
        </div>
        <div class="text-start mb-4">
          <label class="form-label small fw-bold text-secondary">Asal Sekolah</label>
          <input type="text" id="asal-sekolah" class="form-control form-control-lg bg-light fw-semibold text-muted" placeholder="Akan terisi otomatis setelah dicek" readonly required>
        </div>
        <button type="submit" id="btn-masuk" class="btn btn-primary btn-lg w-100 fw-bold shadow" disabled>MASUK RUANG UJIAN</button>
      </form>
    </div>
  </div>

  <div id="exam-page">
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top py-3">
      <div class="container d-flex justify-content-between align-items-center">
        <div>
          <span class="text-secondary small d-block">Peserta Ujian:</span>
          <span class="fw-bold text-primary fs-5" id="display-nama">-</span>
        </div>
        <div class="d-flex align-items-center gap-3">
          <span id="sync-indicator" class="status-sync">✓ Jawaban Tersinkronisasi</span>
          <div class="timer-badge" id="exam-timer">90:00</div>
        </div>
      </div>
    </nav>

    <div class="container my-4">
      <div class="row">
        <div class="col-lg-9 mx-auto" id="box-daftar-soal">
          <div class="text-center py-5 text-muted">Memuat lembar soal...</div>
        </div>
      </div>
    </div>

    <div class="nav-floating-box text-center">
      <p class="small text-muted mb-2 fw-semibold">Pastikan semua soal terjawab sebelum selesai</p>
      <button type="button" onclick="confirmSubmit()" id="btn-submit-final" class="btn btn-danger btn-lg px-5 fw-bold shadow">AKHIRI & KIRIM JAWABAN</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw6iUsySZVMRFgn-eCqDY7aYTfypTBbQlOnuImhlvbSdKqfdMmyJRPIfYDauKOORQLw/exec";

    let participantData = {};
    let userAnswers = {};
    let questionsList = [];
    let timerInterval;
    const DURASI_UJIAN_DETIK = 5400; // 90 Menit

    function cekNomorPeserta() {
      const noInput = document.getElementById('no-peserta').value.trim();
      const btnCek = document.getElementById('btn-cek');
      if(!noInput) { alert("Masukkan nomor ujian terlebih dahulu!"); return; }
      
      btnCek.innerText = "Mengecek...";
      btnCek.disabled = true;

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'checkParticipant', noPeserta: noInput })
      })
      .then(res => res.json())
      .then(res => {
        if(res.success) {
          document.getElementById('nama-peserta').value = res.namaPeserta;
          document.getElementById('asal-sekolah').value = res.asalSekolah;
          document.getElementById('btn-masuk').disabled = false;
          document.getElementById('no-peserta').readOnly = true;
          btnCek.innerText = "✓ VALID";
          btnCek.className = "btn btn-success fw-bold px-3";
          
          participantData = {
            noPeserta: noInput,
            namaPeserta: res.namaPeserta,
            asalSekolah: res.asalSekolah
          };
        } else {
          alert(res.message);
          btnCek.innerText = "CEK NOMOR";
          btnCek.disabled = false;
        }
      })
      .catch(err => {
        console.error(err);
        alert("Error koneksi jaringan. Coba lagi.");
        btnCek.innerText = "CEK NOMOR";
        btnCek.disabled = false;
      });
    }

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-masuk');
      btn.innerText = "Membuka Soal...";
      btn.disabled = true;

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'loginParticipant', noPeserta: participantData.noPeserta })
      })
      .then(res => res.json())
      .then(res => {
        return fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getQuestions' }) });
      })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          questionsList = res.questions;
          startExam();
        } else { 
          alert("Gagal mengambil file bank soal."); 
          btn.innerText = "MASUK RUANG UJIAN"; 
          btn.disabled = false; 
        }
      })
      .catch(err => {
        console.error(err);
        alert("Gagal memuat ruang ujian. Coba lagi.");
        btn.innerText = "MASUK RUANG UJIAN";
        btn.disabled = false;
      });
    }

    function startExam() {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('exam-page').style.display = 'block';
      document.getElementById('display-nama').innerText = participantData.namaPeserta + " (" + participantData.noPeserta.toUpperCase() + ")";
      
      // MEMORI JAWABAN: Memulihkan centangan jawaban terakhir jika di-refresh
      const savedAnswers = localStorage.getItem('cat_answers_' + participantData.noPeserta);
      if (savedAnswers) {
        userAnswers = JSON.parse(savedAnswers);
      }

      renderQuestions();
      startTimer();
    }

    function renderQuestions() {
      const container = document.getElementById('box-daftar-soal');
      container.innerHTML = "";

      if (!questionsList || questionsList.length === 0) {
        container.innerHTML = `
          <div class="alert alert-danger text-start p-4 border border-danger shadow-sm" style="border-radius: 12px;">
            <h5 class="fw-bold mb-3 text-danger">⚠️ Bank Soal Kosong atau Tidak Terbaca!</h5>
            <p class="mb-1">Sistem berhasil login, tetapi gagal menampilkan butir soal. Silakan cek Google Sheets Anda:</p>
            <ol class="mb-0">
              <li>Pastikan <b>Kolom A (No)</b> sudah terisi angka (1, 2, 3, dst) secara berurutan tanpa jeda kosong.</li>
              <li>Pastikan baris soal dimulai tepat di <b>Baris 2 (Row 2)</b>.</li>
            </ol>
          </div>
        `;
        return;
      }

      questionsList.forEach((q) => {
        const qCard = document.createElement('div');
        qCard.className = "question-card shadow-sm";
        let gambarHtml = q.gambar ? `<div class="text-center"><img src="${q.gambar}" class="soal-gambar" alt="Gambar Soal"></div>` : '';
        
        let teksSoal = q.teks || q.soal || q.Soal || q.pertanyaan || "Teks soal tidak tersedia.";
        let optA = q.opsiA || q.OpsiA || q['Opsi A'] || "-";
        let optB = q.opsiB || q.OpsiB || q['Opsi B'] || "-";
        let optC = q.opsiC || q.OpsiC || q['Opsi C'] || "-";
        let optD = q.opsiD || q.OpsiD || q['Opsi D'] || "-";
        let nomor = q.no || q.No || "-";

        // MEMORI TAMPILAN: Otomatis pasang class 'selected' dan tanda 'checked' dari riwayat pengerjaan
        let ansA = (userAnswers[nomor] === 'A') ? 'checked' : '';
        let classA = (userAnswers[nomor] === 'A') ? 'selected' : '';
        let ansB = (userAnswers[nomor] === 'B') ? 'checked' : '';
        let classB = (userAnswers[nomor] === 'B') ? 'selected' : '';
        let ansC = (userAnswers[nomor] === 'C') ? 'checked' : '';
        let classC = (userAnswers[nomor] === 'C') ? 'selected' : '';
        let ansD = (userAnswers[nomor] === 'D') ? 'checked' : '';
        let classD = (userAnswers[nomor] === 'D') ? 'selected' : '';

        qCard.innerHTML = `
          <h5 class="fw-bold mb-3 text-primary">Soal Nomor ${nomor}</h5>
          <p class="fs-5 mb-4 fw-semibold text-dark">${teksSoal}</p>
          ${gambarHtml}
          <div class="options-group">
            <div class="option-btn ${classA}" id="opt-${nomor}-A" onclick="selectOption('${nomor}', 'A')"><input type="radio" name="question-${nomor}" value="A" ${ansA}> <b>A.</b> ${optA}</div>
            <div class="option-btn ${classB}" id="opt-${nomor}-B" onclick="selectOption('${nomor}', 'B')"><input type="radio" name="question-${nomor}" value="B" ${ansB}> <b>B.</b> ${optB}</div>
            <div class="option-btn ${classC}" id="opt-${nomor}-C" onclick="selectOption('${nomor}', 'C')"><input type="radio" name="question-${nomor}" value="C" ${ansC}> <b>C.</b> ${optC}</div>
            <div class="option-btn ${classD}" id="opt-${nomor}-D" onclick="selectOption('${nomor}', 'D')"><input type="radio" name="question-${nomor}" value="D" ${ansD}> <b>D.</b> ${optD}</div>
          </div>
        `;
        container.appendChild(qCard);
      });
    }

    function selectOption(questionNo, optionLetter) {
      userAnswers[questionNo] = optionLetter;
      document.querySelectorAll(`[id^="opt-${questionNo}-"]`).forEach(el => el.classList.remove('selected'));
      document.getElementById(`opt-${questionNo}-${optionLetter}`).classList.add('selected');
      const radio = document.querySelector(`#opt-${questionNo}-${optionLetter} input`);
      if(radio) radio.checked = true;
      
      // Simpan salinan ke penyimpanan lokal browser
      localStorage.setItem('cat_answers_' + participantData.noPeserta, JSON.stringify(userAnswers));
      saveLiveProgress();
    }

    function saveLiveProgress() {
      const syncIndicator = document.getElementById('sync-indicator');
      syncIndicator.innerText = "⏳ Menyimpan data...";
      syncIndicator.style.color = "#f59e0b";

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'saveLiveProgress', participantData: participantData, userAnswers: userAnswers })
      })
      .then(() => { syncIndicator.innerText = "✓ Jawaban Tersinkronisasi"; syncIndicator.style.color = "#10b981"; })
      .catch(err => console.error(err));
    }

    function startTimer() {
      const timerDisplay = document.getElementById('exam-timer');
      
      // MEMORI WAKTU: Cari waktu akhir absolut di komputer siswa agar anti-curang F5
      let savedEndTime = localStorage.getItem('cat_endTime_' + participantData.noPeserta);
      if (!savedEndTime) {
        savedEndTime = Date.now() + (DURASI_UJIAN_DETIK * 1000);
        localStorage.setItem('cat_endTime_' + participantData.noPeserta, savedEndTime);
      }

      timerInterval = setInterval(() => {
        let remainingSeconds = Math.floor((savedEndTime - Date.now()) / 1000);
        
        if (remainingSeconds <= 0) { 
          clearInterval(timerInterval); 
          timerDisplay.innerText = "00:00";
          submitExamFinal(); 
          return;
        }

        let minutes = Math.floor(remainingSeconds / 60);
        let seconds = remainingSeconds % 60;
        timerDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }, 1000);
    }

    function confirmSubmit() {
      if(confirm("Apakah Anda yakin ingin mengakhiri ujian dan mengirimkan jawaban?")) { submitExamFinal(); }
    }

    function submitExamFinal() {
      clearInterval(timerInterval);
      document.getElementById('btn-submit-final').disabled = true;
      
      let savedEndTime = localStorage.getItem('cat_endTime_' + participantData.noPeserta);
      let remainingSeconds = Math.floor((savedEndTime - Date.now()) / 1000);
      let waktuTerpakai = DURASI_UJIAN_DETIK - (remainingSeconds > 0 ? remainingSeconds : 0);

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'submitAnswers', participantData: participantData, userAnswers: userAnswers, totalTimeInSeconds: waktuTerpakai })
      })
      .then(res => res.json())
      .then(res => { 
        if(res.success) { 
          alert("Ujian selesai! Nilai Anda sudah terekam."); 
          // BERSIHKAN MEMORI: Hapus jejak setelah sukses mengumpulkan agar tidak bisa masuk lagi
          localStorage.removeItem('cat_answers_' + participantData.noPeserta);
          localStorage.removeItem('cat_endTime_' + participantData.noPeserta);
          window.location.reload(); 
        } 
      })
      .catch(err => { 
        alert("Koneksi terputus. Klik kembali tombol."); 
        document.getElementById('btn-submit-final').disabled = false; 
      });
    }
  </script>
</body>
</html>
