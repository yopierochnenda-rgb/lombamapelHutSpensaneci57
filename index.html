<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Ujian CAT - SEMARAK SPENSANECI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* KUNCI UTAMA: Matikan scroll browser secara total */
    html, body { 
      height: 100%; 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
      background-color: #f1f5f9; 
      color: #334155; 
      font-family: 'Segoe UI', sans-serif; 
    }
    
    /* Layout Login */
    #login-page { 
      height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    .card-custom { 
      border: none; 
      border-radius: 16px; 
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
      background: #ffffff; 
    }
    .logo-container { 
      width: 70px; 
      height: 70px; 
      border-radius: 50%; 
      background: #fff; 
      border: 3px solid #0d6efd; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      overflow: hidden; 
    }
    .logo-container img { width: 100%; height: 100%; object-fit: cover; }

    /* LAYOUT UTAMA CAT (ANTI-SCROLL HALAMAN) */
    #exam-page { 
      height: 100vh; 
      display: none; 
      flex-direction: column; 
    }
    
    .cat-header { 
      height: 75px; 
      background: #ffffff; 
      border-bottom: 2px solid #e2e8f0; 
      display: flex; 
      align-items: center;
      padding: 0 24px;
      flex-shrink: 0;
    }
    
    .timer-box { 
      font-size: 1.4rem; 
      font-weight: 800; 
      color: #ef4444; 
      background: #fee2e2; 
      padding: 4px 18px; 
      border-radius: 8px; 
      border: 1px solid #fca5a5; 
    }

    /* Pembagian Ruang Panel Kiri & Kanan */
    .cat-workspace {
      flex: 1;
      display: flex;
      padding: 20px;
      gap: 20px;
      overflow: hidden; 
    }

    /* PANEL KIRI: Tempat Soal Aktif */
    .cat-left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    
    /* Box Teks Soal & Opsi */
    .cat-question-content {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }
    
    .soal-gambar { 
      max-width: 100%; 
      max-height: 240px; 
      object-fit: contain; 
      border-radius: 8px; 
      margin: 15px 0; 
      border: 1px solid #e2e8f0; 
    }

    .option-item { 
      display: flex; 
      align-items: center; 
      background: #f8fafc; 
      border: 1px solid #cbd5e1; 
      border-radius: 8px; 
      padding: 14px; 
      margin-bottom: 12px; 
      cursor: pointer; 
      transition: all 0.15s ease; 
    }
    .option-item:hover { background: #f1f5f9; border-color: #94a3b8; }
    .option-item input { transform: scale(1.2); margin-right: 15px; cursor: pointer; }
    .option-item.selected { background: #eff6ff; border-color: #3b82f6; color: #1e40af; font-weight: 600; box-shadow: 0 0 0 1px #3b82f6; }

    /* Tombol Navigasi Bawah */
    .cat-question-footer {
      height: 75px;
      border-top: 1px solid #e2e8f0;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      flex-shrink: 0;
    }

    /* PANEL KANAN: Navigasi Nomor */
    .cat-right-panel {
      width: 360px;
      background: white;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      flex-shrink: 0;
    }

    .cat-grid-wrapper {
      flex: 1;
      overflow-y: auto; 
      padding-right: 5px;
    }

    .grid-nomor { 
      display: grid; 
      grid-template-columns: repeat(5, 1fr); 
      gap: 10px; 
    }
    
    .btn-nav-no { 
      height: 45px; 
      font-weight: bold; 
      border: 1px solid #cbd5e1; 
      border-radius: 8px; 
      background: #ffffff; 
      color: #475569; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      transition: all 0.15s ease; 
    }
    .btn-nav-no:hover { border-color: #64748b; background: #f1f5f9; }
    .btn-nav-no.answered { background: #10b981 !important; color: white !important; border-color: #059669 !important; }
    .btn-nav-no.active-now { background: #3b82f6 !important; color: white !important; border-color: #2563eb !important; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); }
    
    .status-sync { font-size: 0.85rem; font-weight: 600; color: #10b981; }
  </style>
</head>
<body>

  <div id="login-page" class="container">
    <div class="card card-custom p-4 p-md-5 text-center" style="width: 100%; max-width: 480px;">
      <div class="d-flex justify-content-center gap-3 mb-4">
        <div class="logo-container"><img src="logo.png" alt="Logo 1"></div>
        <div class="logo-container" style="border-color: #ffc107;"><img src="logo2.png" alt="Logo 2"></div>
      </div>
      <h4 class="fw-bold text-dark m-0">SEMARAK SPENSANECI</h4>
      <p class="text-muted small mb-4">Sistem CAT Terkunci - Masukkan Nomor Peserta</p>
      
      <div class="text-start mb-3">
        <label class="form-label small fw-bold text-secondary">Nomor Lomba Peserta</label>
        <input type="text" id="no-peserta" class="form-control form-control-lg text-center fw-bold fs-4" style="text-transform: uppercase; letter-spacing: 2px;" placeholder="Ketik Nomor Peserta..." autocomplete="off">
        <div id="status-ketik" class="small mt-1 fw-bold text-muted text-center d-none"></div>
      </div>
      
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="text-start mb-3">
          <label class="form-label small fw-bold text-secondary">Nama Lengkap Peserta</label>
          <input type="text" id="nama-peserta" class="form-control form-control-lg bg-light fw-semibold text-muted" placeholder="Akan muncul otomatis..." readonly required>
        </div>
        <div class="text-start mb-4">
          <label class="form-label small fw-bold text-secondary">Asal Sekolah</label>
          <input type="text" id="asal-sekolah" class="form-control form-control-lg bg-light fw-semibold text-muted" placeholder="Akan muncul otomatis..." readonly required>
        </div>
        <button type="submit" id="btn-masuk" class="btn btn-primary btn-lg w-100 fw-bold shadow" disabled>MASUK RUANG LOMBA</button>
      </form>
    </div>
  </div>

  <div id="exam-page">
    <header class="cat-header shadow-sm bg-white">
      <div class="w-100 d-flex justify-content-between align-items-center">
        <div>
          <h5 class="fw-bold text-dark m-0">CAT SEMARAK SPENSANECI</h5>
          <span class="text-muted small">Peserta: <b class="text-primary" id="display-nama">-</b></span>
        </div>
        <div class="d-flex align-items-center gap-4">
          <span id="sync-indicator" class="status-sync">✓ Tersinkronisasi</span>
          <div class="d-flex align-items-center gap-2 bg-light px-3 py-1 rounded border">
            <span class="small text-secondary fw-bold" style="font-size:0.75rem;">SISA WAKTU:</span>
            <div class="timer-box" id="exam-timer">90:00</div>
          </div>
        </div>
      </div>
    </header>

    <div class="cat-workspace">
      <div class="cat-left-panel" id="container-soal-tunggal">
        <div class="text-center py-5 text-muted">Memuat data ruang ujian...</div>
      </div>
      
      <div class="cat-right-panel">
        <h6 class="fw-bold text-secondary border-bottom pb-2 mb-3">NAVIGASI NOMOR SOAL</h6>
        <div class="cat-grid-wrapper">
          <div class="grid-nomor" id="grid-navigasi-nomor"></div>
        </div>
        <hr class="my-3 flex-shrink-0">
        <div class="d-flex justify-content-between text-center small fw-semibold text-muted mb-3 flex-shrink-0">
          <div><span class="badge bg-primary px-2 py-1 mb-1 d-block">&nbsp;</span>Posisi</div>
          <div><span class="badge bg-success px-2 py-1 mb-1 d-block">&nbsp;</span>Terjawab</div>
          <div><span class="badge bg-white text-dark border px-2 py-1 mb-1 d-block">&nbsp;</span>Kosong</div>
        </div>
        <button type="button" onclick="confirmSubmit()" id="btn-submit-final" class="btn btn-danger w-100 fw-bold py-2 shadow-sm flex-shrink-0">AKHIRI UJIAN</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw6iUsySZVMRFgn-eCqDY7aYTfypTBbQlOnuImhlvbSdKqfdMmyJRPIfYDauKOORQLw/exec";

    let participantData = {};
    let userAnswers = {};
    let questionsList = [];
    let currentIdx = 0; 
    let timerInterval;
    const DURASI_UJIAN_DETIK = 5400; // 90 Menit

    let mengetikTimer;
    const jedaTungguKetik = 500; 
    const inputNoPeserta = document.getElementById('no-peserta');
    const statusKetik = document.getElementById('status-ketik');

    // CHEK AUTOMATIS JIKA PENGGUNA SUDAH LOGIN SEBELUMNYA (ANTI-REFRESH)
    window.addEventListener('DOMContentLoaded', () => {
      const sessionActive = localStorage.getItem('cat_session_active');
      const savedData = localStorage.getItem('cat_participant_data');
      
      if (sessionActive === 'true' && savedData) {
        participantData = JSON.parse(savedData);
        
        // Langsung bypass, ambil soal, dan mulai ujian tanpa form login
        document.getElementById('login-page').style.setProperty('display', 'none', 'important');
        document.getElementById('exam-page').style.display = 'flex';
        
        fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getQuestions' }) })
        .then(res => res.json())
        .then(res => {
          if (res.success) {
            questionsList = res.questions;
            startExam(true); // true = bypass login status ke server
          } else {
            alert("Gagal mengambil file bank soal.");
            resetSessionForce();
          }
        })
        .catch(err => {
          console.error(err);
          alert("Gagal memuat ulang sesi ujian. Coba refresh kembali.");
        });
      }
    });

    function resetSessionForce() {
      localStorage.clear();
      window.location.reload();
    }

    inputNoPeserta.addEventListener('input', function() {
      clearTimeout(mengetikTimer);
      const nilaiInput = inputNoPeserta.value.trim();

      if (!nilaiInput) {
        statusKetik.classList.add('d-none');
        resetFormLogin();
        return;
      }

      statusKetik.classList.remove('d-none');
      statusKetik.className = "small mt-1 fw-bold text-warning text-center";
      statusKetik.innerText = "⏳ Sedang mengetik...";
      resetFormLogin();

      mengetikTimer = setTimeout(cekNomorOtomatis, jedaTungguKetik);
    });

    function resetFormLogin() {
      document.getElementById('nama-peserta').value = "";
      document.getElementById('asal-sekolah').value = "";
      document.getElementById('btn-masuk').disabled = true;
    }

    function cekNomorOtomatis() {
      const noInput = inputNoPeserta.value.trim();
      if (!noInput) return;

      statusKetik.className = "small mt-1 fw-bold text-primary text-center";
      statusKetik.innerText = "🔍 Mencari nomor di server...";

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'checkParticipant', noPeserta: noInput })
      })
      .then(res => res.json())
      .then(res => {
        if(res.success) {
          document.getElementById('nama-peserta').value = res.namaPeserta;
          document.getElementById('asal-sekolah').value = res.asalSekolah;
          document.getElementById('btn-masuk').disabled = false;
          
          statusKetik.className = "small mt-1 fw-bold text-success text-center";
          statusKetik.innerText = "✅ Nomor Ditemukan!";
          
          participantData = {
            noPeserta: noInput,
            namaPeserta: res.namaPeserta,
            asalSekolah: res.asalSekolah
          };
        } else {
          statusKetik.className = "small mt-1 fw-bold text-danger text-center";
          statusKetik.innerText = "❌ Nomor tidak terdaftar!";
          resetFormLogin();
        }
      })
      .catch(err => {
        console.error(err);
        statusKetik.className = "small mt-1 fw-bold text-danger text-center";
        statusKetik.innerText = "⚠️ Gangguan Jaringan!";
      });
    }

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-masuk');
      btn.innerText = "Membuka Sistem CAT...";
      btn.disabled = true;

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'loginParticipant', noPeserta: participantData.noPeserta })
      })
      .then(res => res.json())
      .then(res => {
        return fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getQuestions' }) });
      })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          // Kunci status sesi aktif di lokal komputer siswa
          localStorage.setItem('cat_session_active', 'true');
          localStorage.setItem('cat_participant_data', JSON.stringify(participantData));
          
          questionsList = res.questions;
          
          document.getElementById('login-page').style.setProperty('display', 'none', 'important');
          document.getElementById('exam-page').style.display = 'flex';
          
          startExam(false);
        } else { 
          alert("Gagal mengambil file bank soal."); 
          btn.innerText = "MASUK RUANG UJIAN"; 
          btn.disabled = false; 
        }
      })
      .catch(err => {
        console.error(err);
        alert("Gagal memuat ruang ujian. Coba lagi.");
        btn.innerText = "MASUK RUANG UJIAN";
        btn.disabled = false;
      });
    }

    function startExam(isBypassed) {
      document.getElementById('display-nama').innerText = participantData.namaPeserta + " (" + participantData.asalSekolah + ")";
      
      const savedAnswers = localStorage.getItem('cat_answers_' + participantData.noPeserta);
      if (savedAnswers) {
        userAnswers = JSON.parse(savedAnswers);
      }

      currentIdx = 0; 
      showSingleQuestion();
      renderNavigationGrid();
      startTimer();
    }

    function showSingleQuestion() {
      const container = document.getElementById('container-soal-tunggal');
      if (!questionsList || questionsList.length === 0) {
        container.innerHTML = `<div class="cat-question-content"><div class="alert alert-danger">Bank soal kosong di Google Sheets Anda.</div></div>`;
        return;
      }

      const q = questionsList[currentIdx];
      let nomor = q.no || (currentIdx + 1).toString();
      let gambarHtml = q.gambar ? `<div class="text-center"><img src="${q.gambar}" class="soal-gambar" alt="Gambar Soal"></div>` : '';
      let currentSelected = userAnswers[nomor] || '';

      let htmlContent = `
        <div class="cat-question-content">
          <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
            <h5 class="fw-bold m-0 text-primary">SOAL NOMOR ${nomor}</h5>
            <span class="badge bg-secondary px-2 py-1 fw-bold">Soal ${currentIdx + 1} dari ${questionsList.length}</span>
          </div>
          
          <p class="fs-5 fw-semibold text-dark mb-3" style="line-height: 1.5;">${q.teks}</p>
          ${gambarHtml}
          
          <div class="options-container">
            <div class="option-item ${currentSelected === 'A' ? 'selected' : ''}" onclick="selectOption('${nomor}', 'A')">
              <input type="radio" name="cat-opt" value="A" ${currentSelected === 'A' ? 'checked' : ''}>
              <span><b>A.</b> ${q.opsiA}</span>
            </div>
            <div class="option-item ${currentSelected === 'B' ? 'selected' : ''}" onclick="selectOption('${nomor}', 'B')">
              <input type="radio" name="cat-opt" value="B" ${currentSelected === 'B' ? 'checked' : ''}>
              <span><b>B.</b> ${q.opsiB}</span>
            </div>
            <div class="option-item ${currentSelected === 'C' ? 'selected' : ''}" onclick="selectOption('${nomor}', 'C')">
              <input type="radio" name="cat-opt" value="C" ${currentSelected === 'C' ? 'checked' : ''}>
              <span><b>C.</b> ${q.opsiC}</span>
            </div>
            <div class="option-item ${currentSelected === 'D' ? 'selected' : ''}" onclick="selectOption('${nomor}', 'D')">
              <input type="radio" name="cat-opt" value="D" ${currentSelected === 'D' ? 'checked' : ''}>
              <span><b>D.</b> ${q.opsiD}</span>
            </div>
          </div>
        </div>

        <div class="cat-question-footer">
          <button class="btn btn-outline-secondary fw-bold px-4" onclick="prevQuestion()" ${currentIdx === 0 ? 'disabled' : ''}>◁ SEBELUMNYA</button>
          <button class="btn btn-primary fw-bold px-4" onclick="nextQuestion()" ${currentIdx === questionsList.length - 1 ? 'disabled' : ''}>SELANJUTNYA ▷</button>
        </div>
      `;
      
      container.innerHTML = htmlContent;
    }

    function renderNavigationGrid() {
      const gridContainer = document.getElementById('grid-navigasi-nomor');
      gridContainer.innerHTML = "";

      questionsList.forEach((q, index) => {
        const nomor = q.no || (index + 1).toString();
        const btn = document.createElement('button');
        btn.type = "button";
        btn.className = "btn-nav-no";
        btn.innerText = nomor;

        if (index === currentIdx) {
          btn.classList.add('active-now'); 
        } else if (userAnswers[nomor]) {
          btn.classList.add('answered'); 
        }

        btn.onclick = function() {
          currentIdx = index;
          showSingleQuestion();
          renderNavigationGrid();
        };

        gridContainer.appendChild(btn);
      });
    }

    function selectOption(questionNo, optionLetter) {
      userAnswers[questionNo] = optionLetter;
      
      document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
      const activeRadios = document.getElementsByName('cat-opt');
      activeRadios.forEach(radio => {
        if(radio.value === optionLetter) {
          radio.checked = true;
          radio.parentElement.classList.add('selected');
        }
      });

      localStorage.setItem('cat_answers_' + participantData.noPeserta, JSON.stringify(userAnswers));
      renderNavigationGrid();
      saveLiveProgress();
    }

    function prevQuestion() {
      if (currentIdx > 0) {
        currentIdx--;
        showSingleQuestion();
        renderNavigationGrid();
      }
    }

    function nextQuestion() {
      if (currentIdx < questionsList.length - 1) {
        currentIdx++;
        showSingleQuestion();
        renderNavigationGrid();
      }
    }

    function saveLiveProgress() {
      const syncIndicator = document.getElementById('sync-indicator');
      if(syncIndicator) {
        syncIndicator.innerText = "⏳ Menyimpan...";
        syncIndicator.style.color = "#f59e0b";
      }

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'saveLiveProgress', participantData: participantData, userAnswers: userAnswers })
      })
      .then(() => { 
        if(syncIndicator) {
          syncIndicator.innerText = "✓ Tersinkronisasi"; 
          syncIndicator.style.color = "#10b981"; 
        }
      })
      .catch(err => console.error(err));
    }

    function startTimer() {
      const timerDisplay = document.getElementById('exam-timer');
      let savedEndTime = localStorage.getItem('cat_endTime_' + participantData.noPeserta);
      
      if (!savedEndTime) {
        savedEndTime = Date.now() + (DURASI_UJIAN_DETIK * 1000);
        localStorage.setItem('cat_endTime_' + participantData.noPeserta, savedEndTime);
      }

      timerInterval = setInterval(() => {
        let remainingSeconds = Math.floor((savedEndTime - Date.now()) / 1000);
        
        if (remainingSeconds <= 0) { 
          clearInterval(timerInterval); 
          timerDisplay.innerText = "00:00";
          submitExamFinal(); 
          return;
        }

        let minutes = Math.floor(remainingSeconds / 60);
        let seconds = remainingSeconds % 60;
        timerDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }, 1000);
    }

    function confirmSubmit() {
      if(confirm("Apakah Anda yakin ingin mengakhiri ujian? Pastikan semua nomor di kotak kanan sudah berwarna hijau.")) { 
        submitExamFinal(); 
      }
    }

    function submitExamFinal() {
      clearInterval(timerInterval);
      document.getElementById('btn-submit-final').disabled = true;
      
      let savedEndTime = localStorage.getItem('cat_endTime_' + participantData.noPeserta);
      let remainingSeconds = Math.floor((savedEndTime - Date.now()) / 1000);
      let waktuTerpakai = DURASI_UJIAN_DETIK - (remainingSeconds > 0 ? remainingSeconds : 0);

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'submitAnswers', participantData: participantData, userAnswers: userAnswers, totalTimeInSeconds: waktuTerpakai })
      })
      .then(res => res.json())
      .then(res => { 
        if(res.success) { 
          alert("Ujian selesai! Jawaban Anda telah berhasil dikunci."); 
          
          // BERSIHKAN STATUS SESI KETIKA SELESAI SECARA RESMI
          localStorage.clear();
          window.location.reload(); 
        } 
      })
      .catch(err => { 
        alert("Koneksi internet bermasalah. Silakan klik kembali tombol akhiri ujian."); 
        document.getElementById('btn-submit-final').disabled = false; 
      });
    }
  </script>
</body>
</html>
