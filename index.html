<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Ujian CAT - SEMARAK SPENSANECI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8fafc; color: #334155; font-family: 'Segoe UI', sans-serif; }
    .logo-container { width: 75px; height: 75px; border-radius: 50%; background: #fff; border: 3px solid #0d6efd; display: inline-flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .logo-container img { width: 100%; height: 100%; object-fit: cover; }
    .card-custom { border: none; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); background: #ffffff; }
    
    /* Layout CAT Modern */
    #exam-page { display: none; }
    .cat-header { background: #ffffff; border-bottom: 2px solid #e2e8f0; padding: 15px 0; sticky-top }
    .timer-box { font-size: 1.5rem; font-weight: 800; color: #ef4444; background: #fee2e2; padding: 5px 20px; border-radius: 8px; border: 1px solid #fca5a5; display: inline-block; }
    
    /* Area Soal */
    .question-box { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 30px; min-height: 400px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .soal-gambar { max-width: 100%; max-height: 280px; object-fit: contain; border-radius: 8px; margin: 15px auto; border: 1px solid #e2e8f0; display: block; }
    
    /* Tombol Pilihan Ganda */
    .option-item { display: flex; align-items: center; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 8px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s ease; }
    .option-item:hover { background: #f1f5f9; border-color: #94a3b8; }
    .option-item input { transform: scale(1.3); margin-right: 15px; cursor: pointer; }
    .option-item.selected { background: #eff6ff; border-color: #3b82f6; color: #1e40af; font-weight: 600; box-shadow: 0 0 0 1px #3b82f6; }
    
    /* Sidebar Nomor Navigasi */
    .sidebar-nav { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .grid-nomor { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 320px; overflow-y: auto; padding-right: 5px; }
    .btn-nav-no { width: 100%; height: 45px; font-weight: bold; font-size: 0.95rem; border: 1px solid #cbd5e1; border-radius: 8px; background: #ffffff; color: #475569; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; }
    .btn-nav-no:hover { border-color: #64748b; background: #f1f5f9; }
    .btn-nav-no.answered { background: #10b981 !important; color: white !important; border-color: #059669 !important; }
    .btn-nav-no.active-now { background: #3b82f6 !important; color: white !important; border-color: #2563eb !important; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.4); }
    
    .status-sync { font-size: 0.85rem; font-weight: 600; color: #10b981; display: inline-flex; align-items: center; gap: 5px; }
  </style>
</head>
<body>

  <div id="login-page" class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card card-custom p-4 p-md-5 text-center" style="width: 100%; max-width: 500px;">
      <div class="d-flex justify-content-center gap-3 mb-4">
        <div class="logo-container"><img src="logo.png" alt="Logo 1"></div>
        <div class="logo-container" style="border-color: #ffc107;"><img src="logo2.png" alt="Logo 2"></div>
      </div>
      <h3 class="fw-bold text-dark m-0">SEMARAK SPENSANECI</h3>
      <p class="text-muted small mb-4">Sistem CAT Terkunci - Masukkan Nomor Ujian</p>
      
      <div class="text-start mb-3">
        <label class="form-label small fw-bold text-secondary">Nomor Ujian Peserta</label>
        <div class="input-group">
          <input type="text" id="no-peserta" class="form-control form-control-lg text-center fw-bold" style="text-transform: uppercase;" placeholder="Contoh: SN-001" autocomplete="off">
          <button class="btn btn-dark fw-bold px-3" type="button" id="btn-cek" onclick="cekNomorPeserta()">CEK NOMOR</button>
        </div>
      </div>
      
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="text-start mb-3">
          <label class="form-label small fw-bold text-secondary">Nama Lengkap Peserta</label>
          <input type="text" id="nama-peserta" class="form-control form-control-lg bg-light fw-semibold text-muted" placeholder="Akan terisi otomatis" readonly required>
        </div>
        <div class="text-start mb-4">
          <label class="form-label small fw-bold text-secondary">Asal Sekolah</label>
          <input type="text" id="asal-sekolah" class="form-control form-control-lg bg-light fw-semibold text-muted" placeholder="Akan terisi otomatis" readonly required>
        </div>
        <button type="submit" id="btn-masuk" class="btn btn-primary btn-lg w-100 fw-bold shadow" disabled>MASUK RUANG UJIAN</button>
      </form>
    </div>
  </div>

  <div id="exam-page">
    <header class="cat-header shadow-sm sticky-top bg-white mb-4">
      <div class="container-fluid px-4 d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
          <h5 class="fw-bold text-dark m-0">CAT SEMARAK SPENSANECI</h5>
          <span class="text-muted small">Peserta: <b class="text-primary" id="display-nama">-</b></span>
        </div>
        <div class="d-flex align-items-center gap-4">
          <div class="text-end d-none d-md-block">
            <span id="sync-indicator" class="status-sync">✓ Tersinkronisasi</span>
          </div>
          <div class="text-center">
            <span class="small text-secondary d-block fw-bold" style="font-size:0.75rem;">SISA WAKTU</span>
            <div class="timer-box" id="exam-timer">90:00</div>
          </div>
        </div>
      </div>
    </header>

    <div class="container-fluid px-4">
      <div class="row g-4">
        
        <div class="col-lg-8">
          <div class="question-box" id="container-soal-tunggal">
            <div class="text-center py-5 text-muted">Memuat data soal...</div>
          </div>
        </div>
        
        <div class="col-lg-4">
          <div class="sidebar-nav mb-4">
            <h6 class="fw-bold text-secondary border-bottom pb-2 mb-3">NAVIGASI SOAL</h6>
            
            <div class="grid-nomor id" id="grid-navigasi-nomor">
              </div>
            
            <hr class="my-3">
            
            <div class="d-flex justify-content-between text-center small fw-semibold text-muted mb-4">
              <div><span class="badge bg-primary px-2 py-1 mb-1 d-block">&nbsp;</span>Posisi Sekarang</div>
              <div><span class="badge bg-success px-2 py-1 mb-1 d-block">&nbsp;</span>Sudah Dijawab</div>
              <div><span class="badge bg-white text-dark border px-2 py-1 mb-1 d-block">&nbsp;</span>Belum Dijawab</div>
            </div>
            
            <button type="button" onclick="confirmSubmit()" id="btn-submit-final" class="btn btn-danger w-100 fw-bold py-2 shadow-sm">AKHIRI & KIRIM JAWABAN</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzPhMfO-VBPw4I-PWNql5x8HWLNckVFxnD7DB1eJlMCL1M8iCVEYiDnHaHjFlwU4E7qPQ/exec";

    let participantData = {};
    let userAnswers = {};
    let questionsList = [];
    let currentIdx = 0; // Menyimpan index nomor soal yang sedang dibuka siswa
    let timerInterval;
    const DURASI_UJIAN_DETIK = 5400; // 90 Menit

    function cekNomorPeserta() {
      const noInput = document.getElementById('no-peserta').value.trim();
      const btnCek = document.getElementById('btn-cek');
      if(!noInput) { alert("Masukkan nomor ujian terlebih dahulu!"); return; }
      
      btnCek.innerText = "Mengecek...";
      btnCek.disabled = true;

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'checkParticipant', noPeserta: noInput })
      })
      .then(res => res.json())
      .then(res => {
        if(res.success) {
          document.getElementById('nama-peserta').value = res.namaPeserta;
          document.getElementById('asal-sekolah').value = res.asalSekolah;
          document.getElementById('btn-masuk').disabled = false;
          document.getElementById('no-peserta').readOnly = true;
          btnCek.innerText = "✓ VALID";
          btnCek.className = "btn btn-success fw-bold px-3";
          
          participantData = {
            noPeserta: noInput,
            namaPeserta: res.namaPeserta,
            asalSekolah: res.asalSekolah
          };
        } else {
          alert(res.message);
          btnCek.innerText = "CEK NOMOR";
          btnCek.disabled = false;
        }
      })
      .catch(err => {
        console.error(err);
        alert("Error koneksi jaringan. Coba lagi.");
        btnCek.innerText = "CEK NOMOR";
        btnCek.disabled = false;
      });
    }

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-masuk');
      btn.innerText = "Membuka Sistem CAT...";
      btn.disabled = true;

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'loginParticipant', noPeserta: participantData.noPeserta })
      })
      .then(res => res.json())
      .then(res => {
        return fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getQuestions' }) });
      })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          questionsList = res.questions;
          startExam();
        } else { 
          alert("Gagal mengambil file bank soal."); 
          btn.innerText = "MASUK RUANG UJIAN"; 
          btn.disabled = false; 
        }
      })
      .catch(err => {
        console.error(err);
        alert("Gagal memuat ruang ujian. Coba lagi.");
        btn.innerText = "MASUK RUANG UJIAN";
        btn.disabled = false;
      });
    }

    function startExam() {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('exam-page').style.display = 'block';
      document.getElementById('display-nama').innerText = participantData.namaPeserta + " [" + participantData.asalSekolah + "]";
      
      // Mengambil data jawaban lama di browser jika tidak sengaja ter-refresh
      const savedAnswers = localStorage.getItem('cat_answers_' + participantData.noPeserta);
      if (savedAnswers) {
        userAnswers = JSON.parse(savedAnswers);
      }

      currentIdx = 0; // Mulai dari soal pertama (index 0)
      showSingleQuestion();
      renderNavigationGrid();
      startTimer();
    }

    // FUNGSI UTAMA CAT: Merender HANYA SATU SOAL aktif di layar
    function showSingleQuestion() {
      const container = document.getElementById('container-soal-tunggal');
      if (!questionsList || questionsList.length === 0) {
        container.innerHTML = `<div class="alert alert-danger">Bank soal kosong di Google Sheets Anda.</div>`;
        return;
      }

      const q = questionsList[currentIdx];
      let nomor = q.no || (currentIdx + 1).toString();
      let gambarHtml = q.gambar ? `<img src="${q.gambar}" class="soal-gambar" alt="Gambar Soal">` : '';
      
      // Ambil jawaban terpilih untuk nomor ini (jika ada)
      let currentSelected = userAnswers[nomor] || '';

      let htmlContent = `
        <div>
          <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
            <h4 class="fw-bold m-0 text-primary">SOAL NOMOR ${nomor}</h4>
            <span class="badge bg-secondary px-3 py-2 fw-bold">Soal ${currentIdx + 1} dari ${questionsList.length}</span>
          </div>
          
          <p class="fs-5 fw-semibold text-dark mb-4" style="line-height: 1.6;">${q.teks}</p>
          ${gambarHtml}
          
          <div class="options-container mt-4">
            <div class="option-item ${currentSelected === 'A' ? 'selected' : ''}" onclick="selectOption('${nomor}', 'A')">
              <input type="radio" name="cat-opt" value="A" ${currentSelected === 'A' ? 'checked' : ''}>
              <span><b>A.</b> ${q.opsiA}</span>
            </div>
            <div class="option-item ${currentSelected === 'B' ? 'selected' : ''}" onclick="selectOption('${nomor}', 'B')">
              <input type="radio" name="cat-opt" value="B" ${currentSelected === 'B' ? 'checked' : ''}>
              <span><b>B.</b> ${q.opsiB}</span>
            </div>
            <div class="option-item ${currentSelected === 'C' ? 'selected' : ''}" onclick="selectOption('${nomor}', 'C')">
              <input type="radio" name="cat-opt" value="C" ${currentSelected === 'C' ? 'checked' : ''}>
              <span><b>C.</b> ${q.opsiC}</span>
            </div>
            <div class="option-item ${currentSelected === 'D' ? 'selected' : ''}" onclick="selectOption('${nomor}', 'D')">
              <input type="radio" name="cat-opt" value="D" ${currentSelected === 'D' ? 'checked' : ''}>
              <span><b>D.</b> ${q.opsiD}</span>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center border-top pt-4 mt-4">
          <button class="btn btn-outline-secondary btn-lg fw-bold px-4" onclick="prevQuestion()" ${currentIdx === 0 ? 'disabled' : ''}>◁ SEBELUMNYA</button>
          <button class="btn btn-primary btn-lg fw-bold px-4" onclick="nextQuestion()" ${currentIdx === questionsList.length - 1 ? 'disabled' : ''}>SELANJUTNYA ▷</button>
        </div>
      `;
      
      container.innerHTML = htmlContent;
    }

    // FUNGSI SIDEBAR CAT: Membuat kotak grid nomor angka di samping kanan
    function renderNavigationGrid() {
      const gridContainer = document.getElementById('grid-navigasi-nomor');
      gridContainer.innerHTML = "";

      questionsList.forEach((q, index) => {
        const nomor = q.no || (index + 1).toString();
        const btn = document.createElement('button');
        btn.type = "button";
        btn.className = "btn-nav-no";
        btn.innerText = nomor;

        // Atur warna status kotak angka
        if (index === currentIdx) {
          btn.classList.add('active-now'); // Berwarna biru (posisi aktif siswa)
        } else if (userAnswers[nomor]) {
          btn.classList.add('answered'); // Berwarna hijau (sudah diisi)
        }

        // Jika kotak angka diklik, layar langsung melompat ke nomor itu
        btn.onclick = function() {
          currentIdx = index;
          showSingleQuestion();
          renderNavigationGrid();
        };

        gridContainer.appendChild(btn);
      });
    }

    function selectOption(questionNo, optionLetter) {
      userAnswers[questionNo] = optionLetter;
      
      // Perbarui tampilan centang pada opsi yang diklik
      document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
      const activeRadios = document.getElementsByName('cat-opt');
      activeRadios.forEach(radio => {
        if(radio.value === optionLetter) {
          radio.checked = true;
          radio.parentElement.classList.add('selected');
        }
      });

      // Simpan jawaban lokal dan kirim live progress ke server Google
      localStorage.setItem('cat_answers_' + participantData.noPeserta, JSON.stringify(userAnswers));
      renderNavigationGrid();
      saveLiveProgress();
    }

    function prevQuestion() {
      if (currentIdx > 0) {
        currentIdx--;
        showSingleQuestion();
        renderNavigationGrid();
      }
    }

    function nextQuestion() {
      if (currentIdx < questionsList.length - 1) {
        currentIdx++;
        showSingleQuestion();
        renderNavigationGrid();
      }
    }

    function saveLiveProgress() {
      const syncIndicator = document.getElementById('sync-indicator');
      if(syncIndicator) {
        syncIndicator.innerText = "⏳ Menyimpan...";
        syncIndicator.style.color = "#f59e0b";
      }

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'saveLiveProgress', participantData: participantData, userAnswers: userAnswers })
      })
      .then(() => { 
        if(syncIndicator) {
          syncIndicator.innerText = "✓ Tersinkronisasi"; 
          syncIndicator.style.color = "#10b981"; 
        }
      })
      .catch(err => console.error(err));
    }

    function startTimer() {
      const timerDisplay = document.getElementById('exam-timer');
      let savedEndTime = localStorage.getItem('cat_endTime_' + participantData.noPeserta);
      
      if (!savedEndTime) {
        savedEndTime = Date.now() + (DURASI_UJIAN_DETIK * 1000);
        localStorage.setItem('cat_endTime_' + participantData.noPeserta, savedEndTime);
      }

      timerInterval = setInterval(() => {
        let remainingSeconds = Math.floor((savedEndTime - Date.now()) / 1000);
        
        if (remainingSeconds <= 0) { 
          clearInterval(timerInterval); 
          timerDisplay.innerText = "00:00";
          submitExamFinal(); 
          return;
        }

        let minutes = Math.floor(remainingSeconds / 60);
        let seconds = remainingSeconds % 60;
        timerDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }, 1000);
    }

    function confirmSubmit() {
      if(confirm("Apakah Anda yakin ingin mengakhiri ujian? Pastikan semua nomor di kotak kanan sudah berwarna hijau.")) { 
        submitExamFinal(); 
      }
    }

    function submitExamFinal() {
      clearInterval(timerInterval);
      document.getElementById('btn-submit-final').disabled = true;
      
      let savedEndTime = localStorage.getItem('cat_endTime_' + participantData.noPeserta);
      let remainingSeconds = Math.floor((savedEndTime - Date.now()) / 1000);
      let waktuTerpakai = DURASI_UJIAN_DETIK - (remainingSeconds > 0 ? remainingSeconds : 0);

      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'submitAnswers', participantData: participantData, userAnswers: userAnswers, totalTimeInSeconds: waktuTerpakai })
      })
      .then(res => res.json())
      .then(res => { 
        if(res.success) { 
          alert("Ujian selesai! Terima kasih, jawaban Anda telah dikunci dan dikirim ke server panitia."); 
          localStorage.removeItem('cat_answers_' + participantData.noPeserta);
          localStorage.removeItem('cat_endTime_' + participantData.noPeserta);
          window.location.reload(); 
        } 
      })
      .catch(err => { 
        alert("Koneksi internet bermasalah. Silakan klik kembali tombol akhiri ujian."); 
        document.getElementById('btn-submit-final').disabled = false; 
      });
    }
  </script>
</body>
</html>
